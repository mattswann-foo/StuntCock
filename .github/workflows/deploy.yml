name: Deploy to Fly.io

# Triggers on every push to main (and can be run manually via workflow_dispatch)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false   # never cancel a deploy mid-flight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke-test health endpoint
        # Wait for the machine to come up, then verify /api/health returns 200.
        # FLY_APP_URL should be set in repo vars (e.g. https://stuntcock.fly.dev).
        # If not set we skip this step gracefully.
        run: |
          if [ -z "$FLY_APP_URL" ]; then
            echo "FLY_APP_URL not set — skipping smoke test"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "${FLY_APP_URL}/api/health")
            echo "Attempt $i: HTTP $STATUS — $(cat /tmp/health.txt)"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
        env:
          FLY_APP_URL: ${{ vars.FLY_APP_URL }}
