# backend-deploy.yml — Build, push Docker image to Artifact Registry, deploy to Cloud Run
name: Backend — Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  security-audit:
    name: Security Audit (npm audit + Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── npm audit gate ────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: npm audit (high/critical gate)
        # Exit non-zero if any high or critical vulnerabilities are found.
        # The deploy job will NOT run if this step fails.
        run: npm audit --audit-level=high

      # ── Semgrep static analysis ───────────────────────────────────────────
      - name: Run Semgrep
        # Use the official Semgrep action which handles installation and runs
        # the full scan. We collect findings as SARIF and also as a plain text
        # artifact. The step exits non-zero when ERROR-level findings exist.
        uses: semgrep/semgrep-action@v1
        id: semgrep
        with:
          config: >-
            p/nodejs
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif
          if-no-files-found: ignore

  build-and-deploy:
    name: Build Docker Image & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: security-audit        # Only runs when the audit job succeeds
    permissions:
      contents: read
      id-token: write            # Required for Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ─────────────
      # No service account key JSON is used. Authentication is performed via
      # OIDC token exchange using the Workload Identity Provider configured
      # for this repository.
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Configure Docker to push to Artifact Registry ────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build and push Docker image ───────────────────────────────────────
      - name: Build Docker image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/stuntcock-backend:${{ github.sha }}
        run: |
          docker build \
            --tag "$IMAGE" \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Push Docker image to Artifact Registry
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/stuntcock-backend:${{ github.sha }}
        run: docker push "$IMAGE"

      # ── Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloud-run@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/stuntcock-backend:${{ github.sha }}

      # ── Publish Cloud Run URL to workflow summary ─────────────────────────
      - name: Write Cloud Run URL to job summary
        run: |
          echo "## ✅ Backend Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | \`${{ secrets.CLOUD_RUN_SERVICE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Revision URL** | ${{ steps.deploy.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/stuntcock-backend:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
