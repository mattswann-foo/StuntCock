# fly.toml — StuntCock Fly.io application configuration
# https://fly.io/docs/reference/configuration/

app = "stuntcock"
primary_region = "syd"

[build]
  # Uses the Dockerfile at the repo root

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DATA_DIR = "/data"
  # SIGNAL_CLI_PATH, SIGNAL_PHONE_NUMBER, ANTHROPIC_API_KEY etc. are set via
  # `fly secrets set` and injected at runtime — NOT stored here.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    port = 8080
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  # Persistent volume — stores the SQLite database across restarts/deployments.
  # Created with: fly volumes create stuntcock_data --size 1 --region syd
  source = "stuntcock_data"
  destination = "/data"
  initial_size = "1gb"
